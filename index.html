<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarSense AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>☀️ SolarSense AI</h1>
        <p>Agentic Solar Installation Advisor</p>
    </div>

    <div class="card">

        <h2>Get Your Personalized Solar Report</h2>

        <form id="solarForm">

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" required>
            </div>

            <div class="input-group">
                <label>PIN Code</label>
                <input type="number" id="pincode" required>
            </div>

            <h3>Roof Dimensions</h3>

            <div class="dimension-container">

                <div class="input-group">
                    <label>Length</label>
                    <input type="number" id="length" required>
                </div>

                <div class="input-group">
                    <label>Breadth</label>
                    <input type="number" id="breadth" required>
                </div>

                <div class="input-group">
                    <label>Unit</label>
                    <select id="unit">
                        <option value="feet">Feet</option>
                        <option value="meter">Meter</option>
                    </select>
                </div>

            </div>

            <div class="area-box">
                Calculated Roof Area:
                <span id="roofArea">0</span> sq.ft.
            </div>

            <div class="input-group">
                <label>Average Monthly Electricity Bill (₹)</label>
                <input type="number" id="bill" required>
            </div>

            <button type="submit">
                Generate Solar Report
            </button>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
